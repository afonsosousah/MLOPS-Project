model_selection:
  enabled: true
  metric: rmse
  max_rows: 50000
  candidates:
    random_forest_baseline:
      n_estimators: 80
      max_depth: 12
      min_samples_leaf: 10
      max_features: sqrt
      random_state: 42
      n_jobs: -1
    random_forest_current:
      n_estimators: 120
      max_depth: 16
      min_samples_leaf: 8
      max_features: sqrt
      random_state: 42
      n_jobs: -1
