# Active Kedro catalog for the Green Taxi MLOps project.
# The structure follows the Green Taxi artifact lifecycle and Kedro data layers.

# raw: source data used by ingestion

green_taxi_raw:
  type: partitions.PartitionedDataset
  path: data/01_raw/green_taxi
  dataset: pandas.ParquetDataset
  filename_suffix: .parquet

zone_lookup:
  type: pandas.CSVDataset
  filepath: data/01_raw/taxi_zone_lookup.csv

# intermediate: ingested modeling and drift staging data

ingested_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/ingested_data.parquet

drift_ingested_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/drift_ingested_data.parquet

data_clean:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/data_clean.parquet

# primary: chronological project and train/validation splits

train_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/train_data.parquet

test_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/test_data.parquet

# primary: chronological train/validation feature-label split before learned preprocessing

X_train_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/X_train_data.parquet

X_val_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/X_val_data.parquet

y_train_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/y_train_data.parquet

y_val_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/y_val_data.parquet

# feature artifacts: fitted preprocessing and selected production columns

preprocessing_transformer:
  type: pickle.PickleDataset
  filepath: data/04_feature/preprocessing_transformer.pkl

best_columns:
  type: pickle.PickleDataset
  filepath: data/04_feature/best_columns.pkl

production_columns:
  type: pickle.PickleDataset
  filepath: data/04_feature/production_columns.pkl

# model input: preprocessed matrices consumed by model nodes

X_train_preprocessed:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_train_preprocessed.parquet

X_val_preprocessed:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_val_preprocessed.parquet

X_batch_preprocessed:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_batch_preprocessed.parquet

X_drift_preprocessed:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_drift_preprocessed.parquet

# models

production_model:
  type: pickle.PickleDataset
  filepath: data/06_models/production_model.pkl

# model outputs

validation_predictions:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/validation_predictions.parquet

predictions:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/predictions.parquet

# reporting

reporting_tests:
  type: pandas.CSVDataset
  filepath: data/08_reporting/data_unit_tests_report.csv
  save_args:
    index: false

drift_reporting_tests:
  type: pandas.CSVDataset
  filepath: data/08_reporting/drift_data_unit_tests_report.csv
  save_args:
    index: false

reporting_data_train:
  type: json.JSONDataset
  filepath: data/08_reporting/reporting_data_train.json

production_model_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/production_model_metrics.json

selected_model_metadata:
  type: json.JSONDataset
  filepath: data/08_reporting/selected_model_metadata.json

predict_describe:
  type: json.JSONDataset
  filepath: data/08_reporting/predict_describe.json

model_explainability_metadata:
  type: json.JSONDataset
  filepath: data/08_reporting/model_explainability_metadata.json

drift_report:
  type: pandas.CSVDataset
  filepath: data/08_reporting/drift_report.csv
  save_args:
    index: false

drift_summary:
  type: json.JSONDataset
  filepath: data/08_reporting/drift_summary.json

feature_store_upload_report:
  type: pandas.CSVDataset
  filepath: data/08_reporting/feature_store_upload_report.csv
  save_args:
    index: false
