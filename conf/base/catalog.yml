# Link: https://docs.kedro.org/en/stable/data/data_catalog.html
#
# We support interacting with a variety of data stores including local file systems, cloud, network and HDFS
#
# An example data set definition can look as follows:
#
#bikes:
#  type: pandas.CSVDataset
#  filepath: "data/01_raw/bikes.csv"
#
#weather:
#  type: spark.SparkDataset
#  filepath: s3a://your_bucket/data/01_raw/weather*
#  file_format: csv
#  credentials: dev_s3
#  load_args:
#    header: True
#    inferSchema: True
#  save_args:
#    sep: '|'
#    header: True
#
#scooters:
#  type: pandas.SQLTableDataset
#  credentials: scooters_credentials
#  table_name: scooters
#  load_args:
#    index_col: ['name']
#    columns: ['name', 'gear']
#  save_args:
#    if_exists: 'replace'
#    # if_exists: 'fail'
#    # if_exists: 'append'
#
# The Data Catalog supports being able to reference the same file using two different Dataset implementations
# (transcoding), templating and a way to reuse arguments that are frequently repeated. See more here:
# https://docs.kedro.org/en/stable/data/data_catalog.html

green_taxi_raw:
  type: partitions.PartitionedDataset
  path: data/01_raw/green_taxi
  dataset: pandas.ParquetDataset
  filename_suffix: .parquet

zone_lookup:
  type: pandas.CSVDataset
  filepath: data/01_raw/taxi_zone_lookup.csv

# intermediate: pipeline outputs after ingestion and splitting

ingested_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/ingested_data.parquet

ref_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/ref_data.parquet

analysis_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/analysis_data.parquet

# model_input: train/test splits ready for modeling

X_train:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_train.parquet

X_test:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_test.parquet

y_train:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_train.csv
  save_args:
    index: false

y_test:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_test.csv
  save_args:
    index: false

# models: fitted artifacts

encoder_transform:
  type: pickle.PickleDataset
  filepath: data/06_models/encoder_transform.pkl

trained_model:
  type: pickle.PickleDataset
  filepath: data/06_models/trained_model.pkl

# model_output: batch predictions and explanations

preprocessed_batch_data:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/preprocessed_batch_data.parquet

predictions:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/predictions.parquet

shap_values:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/shap_values.parquet

# reporting

reporting_tests:
  type: pandas.CSVDataset
  filepath: data/08_reporting/data_unit_tests_report.csv
  save_args:
    index: false
