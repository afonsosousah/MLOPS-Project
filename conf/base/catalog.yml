# Active Kedro catalog for the Green Taxi MLOps project.
# Generated starter Spaceflights datasets are intentionally omitted because the
# starter pipelines are not part of the registered project graph.

# raw: source data used by ingestion

green_taxi_raw:
  type: partitions.PartitionedDataset
  path: data/01_raw/green_taxi
  dataset: pandas.ParquetDataset
  filename_suffix: .parquet

zone_lookup:
  type: pandas.CSVDataset
  filepath: data/01_raw/taxi_zone_lookup.csv

# intermediate: ingestion

modeling_ingested_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/modeling_ingested_data.parquet

drift_ingested_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/drift_ingested_data.parquet

# primary: data after cleaning pipeline 

cleaned_data:
  type: pandas.ParquetDataset
  filepath: data/03_primary/cleaned_data.parquet

# feature: data after feature engeneering and selection

engineered_data:
  type: pandas.ParquetDataset
  filepath: data/04_feature/engineered_data.parquet

feature_store_data:
  type: pandas.ParquetDataset
  filepath: data/04_feature/feature_store_data.parquet

# model_input: outputs produced by preprocessing_train

train_data:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/train_data.parquet

val_data:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/val_data.parquet

X_train:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_train.parquet

X_test:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_test.parquet

y_train:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_train.csv
  save_args:
    index: false

y_test:
  type: pandas.CSVDataset
  filepath: data/05_model_input/y_test.csv
  save_args:
    index: false

# models: fitted preprocessing and model artifacts

encoder_transform:
  type: pickle.PickleDataset
  filepath: data/06_models/encoder_transform.pkl

trained_model:
  type: pickle.PickleDataset
  filepath: data/06_models/trained_model.pkl

# model_output: batch inference and explanation artifacts

preprocessed_batch_data:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/preprocessed_batch_data.parquet

predictions:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/predictions.parquet

shap_values:
  type: pandas.ParquetDataset
  filepath: data/07_model_output/shap_values.parquet

production_model:
  type: pickle.PickleDataset
  filepath: data/06_models/production_model.pkl

production_columns:
  type: pickle.PickleDataset
  filepath: data/06_models/columns.pkl

production_model_metrics:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: json.JSONDataset
    filepath: data/08_reporting/production_model_metrics.json

validation_predictions:
  type: pandas.ParquetDataset
  filepath: data/08_reporting/validation_predictions.parquet

# reporting

modeling_data_reporting_tests:
  type: pandas.CSVDataset
  filepath: data/08_reporting/modeling_data_unit_tests_report.csv
  save_args:
    index: false

drift_data_reporting_tests:
  type: pandas.CSVDataset
  filepath: data/08_reporting/drift_data_unit_tests_report.csv
  save_args:
    index: false
